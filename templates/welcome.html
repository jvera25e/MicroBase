<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido a MicroBase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
            gap: 2rem;
            background: radial-gradient(circle at top right, var(--bg-card), var(--bg-main));
        }

        .welcome-header {
            margin-bottom: 1rem;
        }

        .welcome-header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .welcome-header p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 500px;
        }

        .action-cards {
            display: flex;
            gap: 2rem;
            max-width: 800px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 300px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .action-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
        }

        .action-card i {
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            padding: 16px;
            border-radius: 16px;
        }

        .action-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .action-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .login-link {
            margin-top: 2rem;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .action-cards {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body class="dark-theme auth-bg">
    <script>
        if (localStorage.getItem('theme') === 'light') document.body.classList.remove('dark-theme');
        else document.body.classList.add('dark-theme');
    </script>
    <button onclick="toggleTheme()" class="btn btn-secondary"
        style="position: absolute; top: 20px; right: 20px; border-radius: 50%; width: 44px; height: 44px; padding: 0; display: flex; justify-content: center; align-items: center;"
        title="Modo Claro / Oscuro">
        <i data-lucide="moon"></i>
    </button>

    <div class="welcome-container">
        <div class="welcome-header">
            <i data-lucide="database" class="logo-icon logo-large"
                style="width: 80px; height: 80px; margin-bottom: 1rem;"></i>
            <h1>MicroBase</h1>
            <p>La plataforma inteligente para gestionar tu Negocio en la nube.</p>
        </div>

        <div class="action-cards">
            <a href="/register?flow=owner" class="action-card glass-panel">
                <i data-lucide="building-2"></i>
                <h3>Crear mi Negocio</h3>
                <p>Soy el administrador o dueño y quiero crear un espacio para mi empresa.</p>
            </a>

            <a href="/register?flow=employee" class="action-card glass-panel">
                <i data-lucide="users"></i>
                <h3>Unirme a un Negocio</h3>
                <p>Soy empleado y tengo un Código de Negocio para unirme al equipo.</p>
            </a>
        </div>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="/login">Iniciar Sesión</a>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>

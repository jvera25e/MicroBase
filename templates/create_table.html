{% extends "base.html" %}

{% block content %}
<div class="builder-container">
    <header class="top-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn btn-secondary" onclick="window.location.href='/tables-view'" title="Volver">
                <i data-lucide="arrow-left"></i>
            </button>
            <h1>Constructor de Tablas</h1>
        </div>
        <button class="btn btn-success" id="btn-save-table" onclick="saveTable()">
            <i data-lucide="save"></i> Guardar Tabla
        </button>
    </header>

    <div class="builder-layout">
        <!-- Sidebar - Componentes -->
        <aside class="builder-toolbox glass-panel">
            <h3>Componentes</h3>
            <p class="text-muted" style="margin-bottom: 20px;">Arrastra los tipos de datos al lienzo</p>

            <div class="draggable-item" draggable="true" data-type="text" data-icon="type">
                <i data-lucide="type"></i>
                <span>Texto</span>
            </div>
            <div class="draggable-item" draggable="true" data-type="number_int" data-icon="binary">
                <i data-lucide="binary"></i>
                <span>Número Entero</span>
            </div>
            <div class="draggable-item" draggable="true" data-type="number_decimal" data-icon="hash">
                <i data-lucide="hash"></i>
                <span>Número Decimal</span>
            </div>
            <div class="draggable-item" draggable="true" data-type="date" data-icon="calendar">
                <i data-lucide="calendar"></i>
                <span>Fecha</span>
            </div>
            <div class="draggable-item" draggable="true" data-type="select" data-icon="list">
                <i data-lucide="list"></i>
                <span>Selección Única</span>
            </div>
        </aside>

        <!-- Canvas - Estructura -->
        <div class="builder-canvas">
            <div class="canvas-header glass-panel" style="margin-bottom: 24px;">
                <div class="form-group">
                    <label>Nombre de la Tabla <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="table-name" class="input-neumorphic" placeholder="Ej: Proveedores, Gastos..."
                        style="width: 100%; font-size: 1.2rem; font-weight: 600;">
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label>Descripción</label>
                    <textarea id="table-description" class="input-neumorphic" placeholder="¿Para qué sirve esta tabla?"
                        style="width: 100%; height: 60px;"></textarea>
                </div>
            </div>

            <div id="drop-zone" class="drop-zone glass-panel">
                <div class="empty-state">
                    <i data-lucide="mouse-pointer-2" style="width: 48px; height: 48px; opacity: 0.3;"></i>
                    <p class="text-muted">Arrastra aquí tus columnas</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block modals %}
<!-- No extra modals needed for now -->
{% endblock %}

{% block scripts %}
<script src="/static/js/builder.js?v=1.0.6"></script>
{% endblock %}
